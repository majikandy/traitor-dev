name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy marketing site via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.traitor.dev
          port: 21
          protocol: ftps
          username: ${{ secrets.FTP_USER_MARKETING }}
          password: ${{ secrets.FTP_PASS_MARKETING }}
          local-dir: marketing/
          server-dir: /

      - name: Deploy portal via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.traitor.dev
          port: 21
          protocol: ftps
          username: ${{ secrets.FTP_USER_PORTAL }}
          password: ${{ secrets.FTP_PASS_PORTAL }}
          local-dir: portal/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/vendor/**
            **/node_modules/**
            **/.env
            **/storage/logs/**
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/bootstrap/cache/**
