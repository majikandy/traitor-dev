server {
    listen 80;
    server_name localhost;

    root /var/www/portal/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}

# Preview sites — serves customer sites from /var/www/sites
server {
    listen 80;
    server_name ~^(?<slug>[a-z0-9-]+)\.sites\.localhost$;

    set $site_root /var/www/sites;

    # Try to find the site by slug (dots replaced with dashes)
    # In Docker, we serve directly from drafts for simplicity
    root $site_root;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\. { deny all; }
    location ~ /includes/ { deny all; }
}
