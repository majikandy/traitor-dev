# Traitor.dev Portal - Nginx Config
# The management dashboard at portal.traitor.dev

server {
    listen 80;
    server_name portal.traitor.dev;

    root /var/www/traitordev/portal/public;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/php-fpm.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. { deny all; }

    include snippets/security.conf;
}
