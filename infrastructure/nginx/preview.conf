# Traitor.dev - Wildcard Preview Server
#
# Serves any site at: {slug}.sites.traitor.dev
# DNS requirement: *.sites.traitor.dev → A → SERVER_IP (one wildcard record)
#
# Slug convention (dots become dashes):
#   bobtheleicesterbuilder.com → bobtheleicesterbuilder-com.sites.traitor.dev
#   demo.traitor.dev           → demo-traitor-dev.sites.traitor.dev
#
# The map file is auto-generated by the portal or generate-preview-map.sh.
# No per-site nginx config needed for previews.

# Map slug → domain (loaded from generated file)
map $slug $site_domain {
    include /etc/nginx/traitor-preview-map.conf;
    default "";
}

server {
    listen 80;
    server_name ~^(?<slug>[a-z0-9-]+)\.sites\.traitor\.dev$;

    # If slug not in map, return 404
    if ($site_domain = "") {
        return 404;
    }

    # Serve from live/ if published, otherwise drafts/
    # The map file points to the correct root
    set $site_root /home/user/traitordev/sites/$site_domain;

    # Try live first, fall back to drafts
    root $site_root/live/public;

    error_page 403 = @try_drafts;

    index index.php index.html;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/php-fpm.conf;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    location ~ /\. { deny all; }
    location ~ /includes/ { deny all; }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    include snippets/security.conf;

    # Inject a small preview banner at the bottom of every page
    sub_filter '</body>' '<div style="position:fixed;bottom:0;left:0;right:0;background:#1f2937;color:#fff;text-align:center;padding:8px;font-size:13px;font-family:sans-serif;z-index:9999">Preview on <a href="https://traitor.dev" style="color:#60a5fa;text-decoration:underline">traitor.dev</a></div></body>';
    sub_filter_once on;
    sub_filter_types text/html;

    # Fallback: serve from drafts/ for unpublished sites
    location @try_drafts {
        root $site_root/drafts/public;
        try_files $uri $uri/ /index.php?$query_string;
    }
}
