services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./portal:/var/www/portal
      - ./templates:/var/www/templates
      - sites:/var/www/sites
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - SITES_PATH=/var/www/sites
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=traitor
      - DB_USERNAME=traitor
      - DB_PASSWORD=secret
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./portal:/var/www/portal
      - sites:/var/www/sites
    depends_on:
      - app

  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: traitor
      MYSQL_USER: traitor
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sites:
  dbdata:
