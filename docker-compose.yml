services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - ./portal:/var/www/portal
      - ./templates:/var/www/templates
      - sites:/var/www/sites
      - sqlite:/var/www/portal/database
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - SITES_PATH=/var/www/sites

  web:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./portal:/var/www/portal
      - sites:/var/www/sites
    depends_on:
      - app

volumes:
  sites:
  sqlite:
